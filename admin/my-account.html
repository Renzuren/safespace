<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>UPLB Oash · My account</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        up: {
                            DEFAULT: '#6F1A1F',
                            light: '#8E3A3F',
                            dark: '#510E12',
                            muted: '#F1E4E5',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Toast notification library (Physics Toast) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/physics-toast@1.0.0/dist/physics-toast.min.css">
    <script src="https://cdn.jsdelivr.net/npm/physics-toast@1.0.0/dist/physics-toast.min.js"></script>
    <link rel="stylesheet" href="css/myaccount.css">
</head>
<body>
    <!-- Desktop Sidebar - ADMIN -->
    <aside class="hidden md:block w-64 bg-white border-r border-[#EDE4E4] fixed h-screen overflow-y-auto">
        <div class="p-5 flex flex-col h-full">
            <div class="flex items-center gap-2.5 mb-6 pb-4 border-b border-[#EDE4E4]">
                <div class="w-8 h-8 rounded-md bg-up flex items-center justify-center">
                    <i class="fas fa-shield-alt text-white text-sm"></i>
                </div>
                <span class="font-semibold text-[#6F1A1F] text-lg">UPLB Oash</span>
            </div>
            
            <nav class="flex-1 space-y-1">
                <a href="/admin/dashboard.html" class="sidebar-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/admin/appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a>
                <a href="/admin/reports.html" class="sidebar-link"><i class="fas fa-flag"></i> Reports</a>
                <a href="/admin/users.html" class="sidebar-link"><i class="fas fa-users"></i> Users</a>
                <a href="/admin/my-account.html" class="sidebar-link active"><i class="fas fa-user-circle"></i> My account</a>
            </nav>
            
            <div class="pt-4 border-t border-[#EDE4E4]">
                <div class="px-1 pb-2">
                    <div class="text-xs text-[#8F7E7E]">Logged in as</div>
                    <div class="text-sm font-medium" id="sidebarFullName">Loading...</div>
                    <div class="text-xs text-[#8F7E7E]" id="sidebarEmail">Loading...</div>
                </div>
                <a href="#" id="logoutBtn" class="sidebar-link text-[#B02B2B]"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </aside>

    <!-- Mobile Bottom Nav -->
    <div class="mobile-bottom-nav md:hidden">
        <a href="/admin/dashboard.html" class="mobile-nav-item"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="/admin/appointments.html" class="mobile-nav-item"><i class="fas fa-calendar-check"></i><span>Appts</span></a>
        <a href="/admin/reports.html" class="mobile-nav-item"><i class="fas fa-flag"></i><span>Reports</span></a>
        <a href="/admin/users.html" class="mobile-nav-item"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="/admin/my-account.html" class="mobile-nav-item active"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </div>

    <!-- Main Content -->
    <main class="md:ml-64 min-h-screen">
        <div class="max-w-2xl mx-auto p-4 md:p-8 pb-28 md:pb-8">
            <!-- Header -->
            <div class="mb-6">
                <h1 class="text-2xl md:text-3xl font-semibold text-[#2A2424]">My account</h1>
                <p class="text-[#655A5A] text-sm mt-1">Account information (read-only)</p>
            </div>

            <!-- Account Card -->
            <div class="account-card" id="accountCard">
                <!-- Avatar -->
                <div class="avatar" id="avatar">--</div>

                <!-- Role Badge -->
                <div class="flex justify-center mb-8">
                    <div class="info-badge">
                        <i class="fas fa-user-shield"></i>
                        <span id="roleBadge">Administrator</span>
                    </div>
                </div>

                <!-- Account Information Form - READ ONLY, NO EDIT BUTTONS -->
                <form id="accountForm" class="space-y-6">
                    <!-- Full Name -->
                    <div>
                        <label class="form-label">
                            <i class="fas fa-user text-up mr-2"></i>Full name
                        </label>
                        <input type="text" id="fullName" class="form-input" readonly disabled>
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <label class="form-label">
                            <i class="fas fa-envelope text-up mr-2"></i>Email address
                        </label>
                        <input type="email" id="email" class="form-input" readonly disabled>
                    </div>
                    
                    <!-- Member Since (Created At) -->
                    <div>
                        <label class="form-label">
                            <i class="fas fa-calendar-alt text-up mr-2"></i>Member since
                        </label>
                        <input type="text" id="memberSince" class="form-input" readonly disabled>
                    </div>
                </form>

                <div class="mt-6 text-center text-xs text-[#8F7E7E] border-t border-[#EDE4E4] pt-5">
                    <i class="fas fa-lock mr-1"></i> Account details are managed by system administrators
                </div>
            </div>
        </div>
    </main>

    <script src="js/myaccount.js"></script>
    <script src="js/me.js"></script>
</body>
</html>
